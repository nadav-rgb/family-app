<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Family App – היום</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #DDD4C8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      font-family: 'Heebo', -apple-system, sans-serif;
    }

    /* ── Phone shell ── */
    .phone {
      width: 390px;
      min-height: 100vh;
      background: #FAF5EE;
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
      padding-bottom: 100px;
    }

    /* ══════════════════════════════════════
       STATUS BAR
    ══════════════════════════════════════ */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px 6px;
      direction: ltr;
    }
    .status-icons { display: flex; align-items: center; gap: 6px; }
    .status-time  { font-size: 15px; font-weight: 700; color: #1A1A1A; letter-spacing: -.3px; }

    /* ══════════════════════════════════════
       HEADER
    ══════════════════════════════════════ */
    .header {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4px 20px 0;
    }

    .bell-btn {
      position: absolute;
      left: 20px;
      top: 0;
      width: 44px;
      height: 44px;
      background: #fff;
      border: none;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 14px rgba(0,0,0,.09);
      cursor: pointer;
    }
    .bell-dot {
      position: absolute;
      top: 9px;
      right: 9px;
      width: 8px;
      height: 8px;
      background: #EF7228;
      border-radius: 50%;
      border: 2px solid #fff;
    }

    .greeting { text-align: center; }
    .greeting-title {
      font-size: 27px;
      font-weight: 900;
      color: #1A1A1A;
      letter-spacing: -.5px;
      line-height: 1.2;
    }
    .greeting-sub {
      font-size: 13.5px;
      color: #BBBBBB;
      margin-top: 5px;
      font-weight: 400;
      letter-spacing: .1px;
    }
    .greeting-sub strong { color: #EF7228; font-weight: 600; }

    /* ══════════════════════════════════════
       FAMILY ROW
    ══════════════════════════════════════ */
    .family-row {
      display: flex;
      justify-content: center;
      gap: 14px;
      padding: 20px 20px 2px;
      direction: ltr;
    }
    .family-member {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    .avatar-ring {
      width: 66px;
      height: 66px;
      border-radius: 50%;
      border: 3.5px solid #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,.13);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      line-height: 1;
      transition: transform .18s ease;
    }
    .avatar-ring:hover { transform: scale(1.06); }
    .family-name { font-size: 13px; font-weight: 500; color: #555; }

    /* ══════════════════════════════════════
       HERO CARD
    ══════════════════════════════════════ */
    .hero-card {
      margin: 18px 14px;
      background: linear-gradient(130deg, #FDF3E8 0%, #FDEBD5 55%, #FADDBB 100%);
      border-radius: 26px;
      overflow: hidden;
      position: relative;
      min-height: 188px;
    }
    .hero-inner {
      display: flex;
      align-items: flex-end;
      direction: rtl;
    }

    /* Text side */
    .hero-text {
      flex: 1;
      padding: 22px 18px 20px 6px;
    }
    .hero-title {
      font-size: 21px;
      font-weight: 900;
      color: #1A1A1A;
      line-height: 1.25;
      text-align: right;
    }
    .hero-subtitle {
      font-size: 13px;
      color: #999;
      margin-top: 8px;
      line-height: 1.7;
      text-align: right;
      font-weight: 400;
    }

    /* Progress box */
    .progress-box {
      background: rgba(255,255,255,.82);
      border-radius: 14px;
      padding: 10px 13px;
      margin-top: 14px;
      backdrop-filter: blur(6px);
    }
    .progress-label {
      font-size: 12px;
      color: #AAAAAA;
      text-align: right;
      margin-bottom: 7px;
      font-weight: 400;
    }
    .progress-label b { color: #1A1A1A; font-weight: 700; }
    .progress-track {
      height: 7px;
      background: #EDE3D8;
      border-radius: 100px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 25%;
      background: linear-gradient(90deg, #EF7228 0%, #F5A050 100%);
      border-radius: 100px;
    }

    /* Illustration side */
    .hero-illo {
      width: 128px;
      flex-shrink: 0;
      height: 200px;
      position: relative;
    }
    .hero-illo svg {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    /* ══════════════════════════════════════
       SECTION TITLE
    ══════════════════════════════════════ */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 2px 20px 14px;
      gap: 6px;
      direction: rtl;
    }
    .section-title { font-size: 18px; font-weight: 800; color: #1A1A1A; }
    .section-star  { color: #EF7228; font-size: 13px; line-height: 1; }

    /* ══════════════════════════════════════
       TASK CARDS
    ══════════════════════════════════════ */
    .task-list {
      padding: 0 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .task-card {
      background: #fff;
      border-radius: 22px;
      padding: 13px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 2px 18px rgba(0,0,0,.055);
      cursor: pointer;
      direction: rtl;
      transition: box-shadow .18s ease, transform .12s ease;
    }
    .task-card:active { transform: scale(.99); box-shadow: 0 1px 8px rgba(0,0,0,.07); }

    /* Icon box */
    .task-icon {
      width: 46px;
      height: 46px;
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      line-height: 1;
    }

    /* Task body */
    .task-body { flex: 1; text-align: right; }
    .task-name {
      font-size: 16px;
      font-weight: 700;
      color: #1A1A1A;
      letter-spacing: -.2px;
    }
    .task-name.done { text-decoration: line-through; color: #BEB8B0; }

    .assignee-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 5px;
      margin-top: 4px;
    }
    .assignee-label { font-size: 13px; color: #C0B8B0; font-weight: 400; }
    .assignee-avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      line-height: 1;
    }

    /* Time */
    .task-time {
      display: flex;
      align-items: center;
      gap: 4px;
      direction: ltr;
      flex-shrink: 0;
    }
    .task-time-text {
      font-size: 12px;
      color: #C8C0B8;
      font-weight: 400;
      letter-spacing: .2px;
    }

    /* Checkbox */
    .task-check {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 2px solid #E8E0D8;
      background: transparent;
      flex-shrink: 0;
      cursor: pointer;
      transition: background .2s, border-color .2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .task-check.done {
      background: #EF7228;
      border-color: #EF7228;
    }

    /* ══════════════════════════════════════
       BOTTOM NAV
    ══════════════════════════════════════ */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 390px;
      background: #fff;
      border-radius: 26px 26px 0 0;
      padding: 14px 24px 28px;
      display: flex;
      align-items: center;
      box-shadow: 0 -6px 32px rgba(0,0,0,.08);
      direction: ltr;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
    }
    .nav-label { font-size: 12px; color: #C8C0BC; font-weight: 500; font-family: 'Heebo', sans-serif; }
    .nav-item.active .nav-label { color: #EF7228; }

    .nav-active-bar {
      width: 22px;
      height: 3px;
      background: #EF7228;
      border-radius: 2px;
      margin-bottom: 3px;
    }

    /* FAB */
    .fab-slot {
      flex: 1;
      display: flex;
      justify-content: center;
      position: relative;
    }
    .fab-placeholder { height: 24px; width: 62px; }
    .fab {
      position: absolute;
      top: -46px;
      width: 62px;
      height: 62px;
      border-radius: 50%;
      background: linear-gradient(145deg, #F5963A, #EE7020);
      border: none;
      color: #fff;
      font-size: 32px;
      font-weight: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 28px rgba(238, 110, 20, .45);
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease;
      line-height: 1;
    }
    .fab:hover  { transform: scale(1.06); box-shadow: 0 10px 32px rgba(238,110,20,.55); }
    .fab:active { transform: scale(.95);  box-shadow: 0 4px 16px rgba(238,110,20,.35); }
  </style>
</head>
<body>
<div class="phone">

  <!-- ── Status bar ── -->
  <div class="status-bar">
    <div class="status-icons">
      <!-- Battery -->
      <svg width="26" height="13" viewBox="0 0 26 13" fill="none">
        <rect x=".6" y=".6" width="22.8" height="11.8" rx="3.4" stroke="#1A1A1A" stroke-opacity=".35" stroke-width="1.2"/>
        <rect x="2" y="2" width="17" height="9" rx="2" fill="#1A1A1A" fill-opacity=".75"/>
        <path d="M24.3 4.5v4C25.3 8.1 26 7.1 26 6.5s-.7-1.6-1.7-2z" fill="#1A1A1A" fill-opacity=".4"/>
      </svg>
      <!-- Wi-Fi -->
      <svg width="16" height="13" viewBox="0 0 16 13" fill="none">
        <circle cx="8" cy="11.5" r="1.6" fill="#1A1A1A" fill-opacity=".75"/>
        <path d="M4.2 8.2A5.2 5.2 0 0 1 8 6.6a5.2 5.2 0 0 1 3.8 1.6" stroke="#1A1A1A" stroke-opacity=".75" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M1.4 5.4A9 9 0 0 1 8 2.8a9 9 0 0 1 6.6 2.6" stroke="#1A1A1A" stroke-opacity=".75" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <!-- Signal -->
      <svg width="18" height="13" viewBox="0 0 18 13" fill="none">
        <rect x="0"   y="9"   width="3.5" height="4"   rx="1" fill="#1A1A1A" fill-opacity=".75"/>
        <rect x="4.8" y="6.5" width="3.5" height="6.5" rx="1" fill="#1A1A1A" fill-opacity=".75"/>
        <rect x="9.6" y="3.5" width="3.5" height="9.5" rx="1" fill="#1A1A1A" fill-opacity=".75"/>
        <rect x="14.4" y="0"  width="3.5" height="13"  rx="1" fill="#1A1A1A" fill-opacity=".75"/>
      </svg>
    </div>
    <div class="status-time">10:30</div>
  </div>

  <!-- ── Header ── -->
  <div class="header">
    <button class="bell-btn" onclick="alert('התראות')">
      <svg width="20" height="22" viewBox="0 0 20 22" fill="none">
        <path d="M10 22c1.1 0 2-.9 2-2H8c0 1.1.9 2 2 2z" fill="#666"/>
        <path d="M18 16.5V10c0-3.07-1.64-5.64-4.5-6.32V3a1.5 1.5 0 0 0-3 0v.68C7.63 4.36 6 6.92 6 10v6.5L4 18.5v1h12v-1l-2-2z" fill="#555"/>
      </svg>
      <div class="bell-dot"></div>
    </button>
    <div class="greeting">
      <div class="greeting-title">☀️ בוקר טוב, אבא</div>
      <div class="greeting-sub">יום ראשון &nbsp;·&nbsp; <strong>4 משימות</strong> להיום</div>
    </div>
  </div>

  <!-- ── Family avatars ── -->
  <div class="family-row">
    <div class="family-member" onclick="selectMember(this,'אורי')">
      <div class="avatar-ring" style="background:linear-gradient(145deg,#8B7FC4,#6A5BAE);">👦</div>
      <span class="family-name">אורי</span>
    </div>
    <div class="family-member" onclick="selectMember(this,'ליאלי')">
      <div class="avatar-ring" style="background:linear-gradient(145deg,#E8B4A4,#D49080);">👧</div>
      <span class="family-name">ליאלי</span>
    </div>
    <div class="family-member" onclick="selectMember(this,'אמא')">
      <div class="avatar-ring" style="background:linear-gradient(145deg,#C8A88C,#A8886C);">👩</div>
      <span class="family-name">אמא</span>
    </div>
    <div class="family-member" onclick="selectMember(this,'אבא')">
      <div class="avatar-ring" style="background:linear-gradient(145deg,#7A8B9C,#5A6B7C);">👨</div>
      <span class="family-name">אבא</span>
    </div>
  </div>

  <!-- ── Hero card ── -->
  <div class="hero-card">
    <div class="hero-inner">

      <!-- Text -->
      <div class="hero-text">
        <div class="hero-title">💗 סידרנו לך את היום</div>
        <div class="hero-subtitle">יש לך יום מלא ומיוחד,<br>אנחנו כאן כדי לעזור</div>
        <div class="progress-box">
          <div class="progress-label"><b>1</b> מתוך 4 הושלמו</div>
          <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        </div>
      </div>

      <!-- Illustration (CSS/SVG character) -->
      <div class="hero-illo">
        <svg width="128" height="200" viewBox="0 0 128 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Body / sweater -->
          <ellipse cx="64" cy="168" rx="52" ry="38" fill="#D8C9B4"/>
          <ellipse cx="64" cy="175" rx="56" ry="36" fill="#CFC0AA"/>
          <!-- Neck -->
          <rect x="53" y="108" width="22" height="24" rx="10" fill="#D4A48A"/>
          <!-- Head shape -->
          <ellipse cx="64" cy="94" rx="35" ry="37" fill="#D4A48A"/>
          <!-- Hair base (bun down) -->
          <ellipse cx="64" cy="64" rx="32" ry="26" fill="#4A2C14"/>
          <!-- Hair volume -->
          <ellipse cx="64" cy="62" rx="28" ry="22" fill="#5C3818"/>
          <!-- Bun top -->
          <circle cx="64" cy="50" r="15" fill="#4A2C14"/>
          <circle cx="64" cy="49" r="12" fill="#5C3818"/>
          <!-- Bun highlight -->
          <ellipse cx="60" cy="45" rx="5" ry="4" fill="#6E4422" opacity=".6"/>
          <!-- Hair sides -->
          <ellipse cx="32" cy="88" rx="9" ry="20" fill="#4A2C14"/>
          <ellipse cx="96" cy="88" rx="9" ry="20" fill="#4A2C14"/>
          <!-- Face -->
          <!-- Cheeks -->
          <ellipse cx="44" cy="100" rx="11" ry="7" fill="#F0A898" opacity=".45"/>
          <ellipse cx="84" cy="100" rx="11" ry="7" fill="#F0A898" opacity=".45"/>
          <!-- Eyes -->
          <ellipse cx="51" cy="92" rx="5.5" ry="6.5" fill="#2A1A0A"/>
          <ellipse cx="77" cy="92" rx="5.5" ry="6.5" fill="#2A1A0A"/>
          <!-- Eye shine -->
          <circle cx="53" cy="90" r="2.2" fill="white" opacity=".85"/>
          <circle cx="79" cy="90" r="2.2" fill="white" opacity=".85"/>
          <!-- Brow lines -->
          <path d="M45 84 Q51 81 57 83" stroke="#4A2C14" stroke-width="2" stroke-linecap="round" fill="none"/>
          <path d="M71 83 Q77 81 83 84" stroke="#4A2C14" stroke-width="2" stroke-linecap="round" fill="none"/>
          <!-- Nose -->
          <path d="M64 97 Q61 104 64 105 Q67 104 64 97" fill="#C0907A" opacity=".5"/>
          <!-- Smile -->
          <path d="M54 110 Q64 118 74 110" stroke="#C07A65" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <!-- Sweater neckline detail -->
          <path d="M36 148 Q64 140 92 148 L100 200 H28 Z" fill="#C8B8A4"/>
          <!-- Arm hint -->
          <ellipse cx="18" cy="168" rx="16" ry="12" fill="#CFC0AA" transform="rotate(-20 18 168)"/>
          <ellipse cx="110" cy="168" rx="16" ry="12" fill="#CFC0AA" transform="rotate(20 110 168)"/>
        </svg>
      </div>

    </div>
  </div>

  <!-- ── Section title ── -->
  <div class="section-header">
    <span class="section-title">המשימות להיום</span>
    <span class="section-star">✦</span>
  </div>

  <!-- ── Task list ── -->
  <div class="task-list">

    <!-- Task 1 -->
    <div class="task-card" onclick="toggleTask(this)">
      <div class="task-icon" style="background:#FEF0E0;">🛒</div>
      <div class="task-body">
        <div class="task-name">לקנות חלב</div>
        <div class="assignee-row">
          <span class="assignee-label">אמא</span>
          <div class="assignee-avatar" style="background:#C8A88C;">👩</div>
        </div>
      </div>
      <div class="task-time">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <circle cx="6.5" cy="6.5" r="5.7" stroke="#D8D0C8" stroke-width="1.3"/>
          <path d="M6.5 3.8v2.7l1.8 1.6" stroke="#D8D0C8" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="task-time-text">08:30</span>
      </div>
      <div class="task-check">
        <svg class="check-mark" width="14" height="11" viewBox="0 0 14 11" fill="none" style="opacity:0">
          <path d="M1 5.5L5 9.5L13 1.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>

    <!-- Task 2 -->
    <div class="task-card" onclick="toggleTask(this)">
      <div class="task-icon" style="background:#FDEEF3;">📞</div>
      <div class="task-body">
        <div class="task-name">להתקשר לסבתא</div>
        <div class="assignee-row">
          <span class="assignee-label">אורי</span>
          <div class="assignee-avatar" style="background:#8B7FC4;">👦</div>
        </div>
      </div>
      <div class="task-time">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <circle cx="6.5" cy="6.5" r="5.7" stroke="#D8D0C8" stroke-width="1.3"/>
          <path d="M6.5 3.8v2.7l1.8 1.6" stroke="#D8D0C8" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="task-time-text">09:15</span>
      </div>
      <div class="task-check">
        <svg class="check-mark" width="14" height="11" viewBox="0 0 14 11" fill="none" style="opacity:0">
          <path d="M1 5.5L5 9.5L13 1.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>

    <!-- Task 3 -->
    <div class="task-card" onclick="toggleTask(this)">
      <div class="task-icon" style="background:#EEEEF8;">🚗</div>
      <div class="task-body">
        <div class="task-name">לאסוף את הילדים</div>
        <div class="assignee-row">
          <span class="assignee-label">אבא</span>
          <div class="assignee-avatar" style="background:#7A8B9C;">👨</div>
        </div>
      </div>
      <div class="task-time">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <circle cx="6.5" cy="6.5" r="5.7" stroke="#D8D0C8" stroke-width="1.3"/>
          <path d="M6.5 3.8v2.7l1.8 1.6" stroke="#D8D0C8" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="task-time-text">15:30</span>
      </div>
      <div class="task-check">
        <svg class="check-mark" width="14" height="11" viewBox="0 0 14 11" fill="none" style="opacity:0">
          <path d="M1 5.5L5 9.5L13 1.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>

    <!-- Task 4 -->
    <div class="task-card" onclick="toggleTask(this)">
      <div class="task-icon" style="background:#E8F5F0;">🧾</div>
      <div class="task-body">
        <div class="task-name">לשלם חשבון</div>
        <div class="assignee-row">
          <span class="assignee-label">אמא</span>
          <div class="assignee-avatar" style="background:#C8A88C;">👩</div>
        </div>
      </div>
      <div class="task-time">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <circle cx="6.5" cy="6.5" r="5.7" stroke="#D8D0C8" stroke-width="1.3"/>
          <path d="M6.5 3.8v2.7l1.8 1.6" stroke="#D8D0C8" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="task-time-text">20:00</span>
      </div>
      <div class="task-check">

<script>
  /* ── Toggle task checkbox ── */
  let doneCount = 0;
  const TOTAL = 4;

  function toggleTask(card) {
    const check = card.querySelector('.task-check');
    const mark  = card.querySelector('.check-mark');
    const name  = card.querySelector('.task-name');
    const isDone = check.classList.toggle('done');

    mark.style.opacity = isDone ? '1' : '0';
    name.classList.toggle('done', isDone);
    doneCount += isDone ? 1 : -1;

    /* Update progress bar & label */
    const pct = (doneCount / TOTAL) * 100;
    document.getElementById('progressFill').style.width = pct + '%';
    document.querySelector('.progress-label').innerHTML =
      `<b>${doneCount}</b> מתוך ${TOTAL} הושלמו`;
  }

  /* ── Switch nav tab ── */
  function switchNav(el) {
    document.querySelectorAll('.nav-item').forEach(n => {
      n.classList.remove('active');
      const bar = n.querySelector('.nav-active-bar');
      if (bar) bar.remove();
    });
    el.classList.add('active');
    const bar = document.createElement('div');
    bar.className = 'nav-active-bar';
    el.insertBefore(bar, el.firstChild);
  }

  /* ── Avatar member select ── */
  function selectMember(el, name) {
    document.querySelectorAll('.avatar-ring').forEach(r => r.style.outline = 'none');
    el.querySelector('.avatar-ring').style.outline = '3px solid #EF7228';
    el.querySelector('.avatar-ring').style.outlineOffset = '2px';
  }
</script>
