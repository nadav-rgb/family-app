<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <title>Family — Day Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{
      background:radial-gradient(ellipse at 40% 30%,#e8ddd4,#d4c8bd);
      min-height:100vh;min-height:100dvh;display:flex;justify-content:center;align-items:center;
      font-family:'Nunito',sans-serif;padding:32px 16px;
    }

    /* ── Phone ── */
    .phone{
      width:375px;height:812px;
      background:linear-gradient(175deg,#fffaf5 0%,#fff4e8 55%,#fdebd8 100%);
      border-radius:48px;
      box-shadow:0 40px 100px rgba(0,0,0,.18),0 12px 36px rgba(0,0,0,.09),inset 0 1px 0 rgba(255,255,255,.9);
      overflow:hidden;position:relative;display:flex;flex-direction:column;
      border:1px solid rgba(255,255,255,.6);
    }
    @media(max-width:500px){
      body{padding:0;align-items:stretch;min-height:100vh;min-height:100dvh;}
      .phone{width:100%;height:100vh;height:100dvh;border-radius:0;box-shadow:none;border:none;}
    }

    /* ── Status bar ── */
    .sbar{display:flex;justify-content:space-between;align-items:center;padding:16px 28px 0;font-size:13px;font-weight:800;color:#2d2018;flex-shrink:0;}
    .sbar-r{display:flex;align-items:center;gap:5px;}

    /* ── Screen ── */
    .screen{flex:1;display:flex;flex-direction:column;overflow:hidden;}

    /* ── Top bar ── */
    .topbar{padding:10px 20px 0;flex-shrink:0;animation:fadeUp .3s ease both;}
    .back{
      display:inline-flex;align-items:center;gap:7px;background:none;border:none;cursor:pointer;
      font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:#9e8878;
      padding:8px 14px;border-radius:14px;transition:background .15s;
    }
    .back:active{background:rgba(0,0,0,.06);}

    /* ── Hero ── */
    .hero{padding:14px 24px 12px;flex-shrink:0;}
    .hero-tag{animation:fadeUp .3s ease .05s both;}
    .hero-h1 {animation:fadeUp .36s ease .13s both;}
    .hero-sub{animation:fadeUp .3s ease .21s both;}
    .hero-meta{animation:fadeUp .3s ease .27s both;}

    /* Sparkle emoji — gentle pulse after entrance */
    .sparkle-emoji{
      display:inline-block;
      animation:sparklePulse 2.8s ease-in-out 1.3s infinite;
    }
    @keyframes sparklePulse{
      0%,100%{transform:scale(1) rotate(0deg);}
      50%    {transform:scale(1.22) rotate(12deg);}
    }

    .hero-tag{
      display:inline-flex;align-items:center;gap:6px;
      background:rgba(255,112,51,.1);border-radius:20px;padding:5px 12px;
      font-size:11px;font-weight:900;color:#e07c3a;text-transform:uppercase;letter-spacing:.8px;
      margin-bottom:10px;
    }
    .hero-h1{font-size:24px;font-weight:900;color:#1c110a;line-height:1.25;margin-bottom:5px;}
    .hero-sub{font-size:13px;font-weight:600;color:#b0a098;transition:color .3s ease;}
    .hero-meta{
      display:flex;gap:12px;margin-top:12px;
    }
    .meta-pill{
      display:inline-flex;align-items:center;gap:5px;
      background:rgba(255,255,255,.7);border-radius:20px;padding:5px 11px;
      font-size:11.5px;font-weight:800;color:#7a6055;
      box-shadow:0 1px 6px rgba(0,0,0,.06);
    }

    /* ── Task list ── */
    .task-list{
      flex:1;overflow-y:auto;overflow-x:hidden;
      padding:6px 20px 12px;
      display:flex;flex-direction:column;gap:10px;
      scrollbar-width:none;
      position:relative; /* needed for shimmer child */
    }
    .task-list::-webkit-scrollbar{display:none;}

    /* One-shot warm shimmer that sweeps the list on load */
    .list-shimmer{
      position:absolute;inset:0;pointer-events:none;z-index:20;
      background:linear-gradient(
        110deg,
        transparent 20%,
        rgba(255,215,150,.16) 42%,
        rgba(255,255,255,.28) 50%,
        rgba(255,215,150,.16) 58%,
        transparent 80%
      );
      transform:translateX(-160%);
      animation:listShimmer 1.1s ease-in-out .8s forwards;
    }
    @keyframes listShimmer{
      0%  {transform:translateX(-160%);}
      100%{transform:translateX(200%);}
    }

    /* ── Task card ── */
    .task-card{
      background:white;border-radius:20px;overflow:hidden;
      box-shadow:0 2px 14px rgba(100,60,20,.08);
      touch-action:none;user-select:none;position:relative;
      transition:box-shadow .2s ease, transform .22s ease;
    }
    .task-card.entering{animation:cardIn .42s ease both;}
    .task-card.settling{animation:cardSettle .22s ease both;}
    .task-card.lifting{
      box-shadow:0 14px 40px rgba(100,60,20,.17),0 4px 12px rgba(100,60,20,.08);
      z-index:10;
    }

    /* Cards feel "placed" — slight scale + translateY with a soft overshoot */
    .task-card.entering{animation:cardIn .5s cubic-bezier(.34,1.28,.64,1) both;}
    @keyframes cardIn{
      from{opacity:0;transform:translateY(24px) scale(.94);}
      to  {opacity:1;transform:translateY(0)    scale(1);}
    }
    @keyframes cardSettle{from{opacity:.75;transform:scale(.97);}to{opacity:1;transform:scale(1);}}

    .card-inner{
      display:flex;align-items:center;gap:12px;
      padding:14px 14px 14px 0;
    }

    /* Colored left strip */
    .card-accent{width:5px;align-self:stretch;border-radius:0 5px 5px 0;flex-shrink:0;}

    /* Time */
    .card-time-col{min-width:44px;text-align:center;flex-shrink:0;}
    .card-time{display:block;font-size:14px;font-weight:900;color:#1c110a;line-height:1;}
    .card-ampm{display:block;font-size:10px;font-weight:700;color:#c4ae9f;margin-top:2px;}

    /* Separator */
    .card-vline{width:1px;height:36px;background:#f0ebe5;flex-shrink:0;}

    /* Body */
    .card-body{flex:1;min-width:0;}
    .card-title{font-size:14.5px;font-weight:800;color:#1c110a;margin-bottom:4px;line-height:1.2;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .card-chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:#9e8878;}
    .chip-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

    /* Avatar */
    .card-av{
      width:36px;height:36px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:18px;flex-shrink:0;
    }

    /* Drag handle */
    .drag-handle{display:flex;align-items:center;padding:0 2px;cursor:grab;flex-shrink:0;opacity:.4;transition:opacity .15s;}
    .task-card:hover .drag-handle{opacity:.7;}
    .drag-handle:active{cursor:grabbing;}

    /* Time adjuster */
    .time-adj{
      max-height:0;overflow:hidden;
      transition:max-height .28s cubic-bezier(.34,1,.64,1);
      border-top:1px solid transparent;
    }
    .time-adj.open{
      max-height:56px;
      border-top-color:#f5ede5;
    }
    .time-adj-inner{
      display:flex;align-items:center;justify-content:center;gap:14px;
      padding:10px 0;
    }
    .adj-btn{
      width:56px;height:30px;border-radius:10px;border:none;cursor:pointer;
      background:rgba(255,112,51,.1);
      font-family:'Nunito',sans-serif;font-size:12px;font-weight:900;color:#e07c3a;
      transition:background .15s,transform .12s;
    }
    .adj-btn:active{background:rgba(255,112,51,.22);transform:scale(.93);}
    .adj-time-disp{font-size:18px;font-weight:900;color:#1c110a;min-width:54px;text-align:center;}

    /* ── Bottom ── */
    .bottom-area{
      padding:12px 20px 26px;flex-shrink:0;
      display:flex;flex-direction:column;gap:10px;
      background:rgba(255,248,242,.94);
      backdrop-filter:blur(22px);
      border-top:1px solid rgba(240,225,210,.55);
      animation:fadeUp .4s ease .14s both;
    }
    .btn-primary{
      width:100%;padding:16px;border-radius:18px;border:none;cursor:pointer;
      background:linear-gradient(135deg,#ff9a4e,#ff5e14);
      font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;color:white;
      box-shadow:0 6px 20px rgba(255,94,20,.32);
      transition:transform .18s,box-shadow .18s,background .4s;
    }
    .btn-primary:active{transform:scale(.97);box-shadow:0 3px 12px rgba(255,94,20,.22);}
    .btn-primary.success{
      background:linear-gradient(135deg,#6ee7a0,#22c55e);
      box-shadow:0 6px 20px rgba(34,197,94,.3);
      animation:btnPop .32s cubic-bezier(.34,1.5,.64,1) both;
    }
    @keyframes btnPop{from{transform:scale(.94);}to{transform:scale(1);}}

    /* Card success — bounce + warm glow ring */
    @keyframes cardBounce{
      0%  {transform:scale(1);}
      30% {transform:scale(1.045);}
      65% {transform:scale(.975);}
      100%{transform:scale(1);}
    }
    @keyframes cardGlow{
      0%,100%{box-shadow:0 2px 14px rgba(100,60,20,.08);}
      45%    {box-shadow:0 6px 28px rgba(255,112,51,.22),0 0 0 3px rgba(255,112,51,.08);}
    }
    .task-card.success-anim{
      animation:cardBounce .48s ease both, cardGlow .55s ease both;
    }
    .btn-ghost{
      width:100%;padding:13px;border-radius:18px;border:1.5px solid rgba(224,124,58,.28);cursor:pointer;
      background:none;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;color:#e07c3a;
      transition:background .18s;
    }
    .btn-ghost:active{background:rgba(224,124,58,.07);}

    @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  </style>
</head>
<body>

<div class="phone">

  <!-- Status bar -->
  <div class="sbar">
    <span>9:41</span>
    <div class="sbar-r">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <rect x="0"  y="4"   width="3" height="8"   rx="1" fill="#2d2018"/>
        <rect x="4"  y="2.5" width="3" height="9.5" rx="1" fill="#2d2018"/>
        <rect x="8"  y="1"   width="3" height="11"  rx="1" fill="#2d2018"/>
        <rect x="12" y="0"   width="3" height="12"  rx="1" fill="#2d2018"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 20 14" fill="none">
        <path d="M10 2.5C13.5 2.5 16.6 4 18.8 6.4L20 5.2C17.5 2.4 13.9.5 10 .5 6.1.5 2.5 2.4 0 5.2L1.2 6.4C3.4 4 6.5 2.5 10 2.5Z" fill="#2d2018"/>
        <path d="M10 6C12.4 6 14.5 7 16 8.7L17.2 7.5C15.4 5.5 12.8 4 10 4 7.2 4 4.6 5.5 2.8 7.5L4 8.7C5.5 7 7.6 6 10 6Z" fill="#2d2018"/>
        <path d="M10 9.5C11.4 9.5 12.6 10.1 13.5 11L10 14.5 6.5 11C7.4 10.1 8.6 9.5 10 9.5Z" fill="#2d2018"/>
      </svg>
      <svg width="26" height="12" viewBox="0 0 26 12" fill="none">
        <rect x=".5" y=".5" width="22" height="11" rx="3.5" stroke="#2d2018" stroke-opacity=".35"/>
        <rect x="1.5" y="1.5" width="18" height="9" rx="2.5" fill="#2d2018"/>
        <path d="M24 4.5v3a2 2 0 0 1 0-3Z" fill="#2d2018" fill-opacity=".4"/>
      </svg>
    </div>
  </div>

  <div class="screen">

    <!-- Back -->
    <div class="topbar">
      <button class="back">
        <svg width="8" height="14" viewBox="0 0 8 14" fill="none">
          <path d="M7 1L1 7l6 6" stroke="#9e8878" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Back
      </button>
    </div>

    <!-- Hero -->
    <div class="hero">
      <div class="hero-tag">✨ Ready</div>
      <div class="hero-h1">We organized<br>your day <span class="sparkle-emoji">✨</span></div>
      <div class="hero-sub" id="heroSub">Feel free to tweak anything</div>
      <div class="hero-meta">
        <span class="meta-pill">📋 4 tasks</span>
        <span class="meta-pill">👩 Mom · 👨 Dad</span>
      </div>
    </div>

    <!-- Task list -->
    <div class="task-list" id="taskList">
      <div class="list-shimmer"></div>
    </div>

    <!-- Bottom -->
    <div class="bottom-area">
      <button class="btn-primary" id="btnOk">Looks good</button>
      <button class="btn-ghost"   id="btnAdjust">Adjust</button>
    </div>

  </div>
</div>

<script>
// ─── Data ─────────────────────────────────────────────────────────────────────
const PEOPLE = {
  Mom: { color:'#ffb3c8', bg:'linear-gradient(135deg,#ffd6e6,#ffb3c8)', emoji:'👩' },
  Dad: { color:'#93c5fd', bg:'linear-gradient(135deg,#c8e4ff,#93c5fd)', emoji:'👨' },
};

let tasks = [
  { id:1, title:'White laundry',   person:'Mom', mins: 8*60+30 },
  { id:2, title:'Pick up Yonatan', person:'Dad', mins:15*60    },
  { id:3, title:'Dudi class',      person:'Mom', mins:16*60    },
  { id:4, title:'Buy groceries',   person:'Dad', mins:17*60+30 },
];

let openAdj = null;

function minsToTime(m) {
  return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
}
function ampm(m) { return m < 12*60 ? 'AM' : 'PM'; }

// ─── Render ────────────────────────────────────────────────────────────────────
function renderTasks(animate) {
  const list = document.getElementById('taskList');
  list.innerHTML = '';
  tasks.forEach((task, i) => {
    const p   = PEOPLE[task.person];
    const card = document.createElement('div');
    card.className  = 'task-card ' + (animate ? 'entering' : 'settling');
    card.dataset.id  = task.id;
    if (animate) card.style.animationDelay = `${0.32 + i * 0.13}s`;

    card.innerHTML = `
      <div class="card-inner">
        <div class="card-accent" style="background:${p.color}"></div>
        <div class="card-time-col">
          <span class="card-time">${minsToTime(task.mins)}</span>
          <span class="card-ampm">${ampm(task.mins)}</span>
        </div>
        <div class="card-vline"></div>
        <div class="card-body">
          <div class="card-title">${task.title}</div>
          <div class="card-chip">
            <span class="chip-dot" style="background:${p.color}"></span>
            ${task.person}
          </div>
        </div>
        <div class="card-av" style="background:${p.bg}">${p.emoji}</div>
        <div class="drag-handle">
          <svg width="10" height="16" viewBox="0 0 10 16" fill="none">
            <circle cx="3" cy="3"  r="1.5" fill="#c4ae9f"/>
            <circle cx="7" cy="3"  r="1.5" fill="#c4ae9f"/>
            <circle cx="3" cy="8"  r="1.5" fill="#c4ae9f"/>
            <circle cx="7" cy="8"  r="1.5" fill="#c4ae9f"/>
            <circle cx="3" cy="13" r="1.5" fill="#c4ae9f"/>
            <circle cx="7" cy="13" r="1.5" fill="#c4ae9f"/>
          </svg>
        </div>
      </div>
      <div class="time-adj${task.id === openAdj ? ' open' : ''}">
        <div class="time-adj-inner">
          <button class="adj-btn" data-action="minus" data-id="${task.id}">− 15</button>
          <span class="adj-time-disp">${minsToTime(task.mins)}</span>
          <button class="adj-btn" data-action="plus"  data-id="${task.id}">+ 15</button>
        </div>
      </div>
    `;

    attachDrag(card, i);
    list.appendChild(card);
  });
}

// ─── Drag ─────────────────────────────────────────────────────────────────────
let drag = { on: false, idx: -1, el: null, startY: 0, dy: 0, moved: false };

function attachDrag(card, index) {
  card.addEventListener('pointerdown', e => {
    if (e.target.closest('.adj-btn')) return;
    drag = { on: true, idx: index, el: card, startY: e.clientY, dy: 0, moved: false };
    card.setPointerCapture(e.pointerId);
  });

  card.addEventListener('pointermove', e => {
    if (!drag.on || drag.el !== card) return;
    const dy = e.clientY - drag.startY;

    if (!drag.moved) {
      if (Math.abs(dy) < 7) return;
      drag.moved = true;
      card.classList.add('lifting');
      if (openAdj) { openAdj = null; }
    }

    drag.dy = dy;
    card.style.transform = `translateY(${dy}px) scale(1.026)`;

    // Shift siblings to show new slot
    const slot = Math.round(dy / (card.offsetHeight + 10));
    document.querySelectorAll('.task-card:not(.lifting)').forEach(other => {
      const oi = tasks.findIndex(t => t.id === parseInt(other.dataset.id));
      let shift = 0;
      if (slot > 0 && oi > index && oi <= index + slot) shift = -1;
      if (slot < 0 && oi < index && oi >= index + slot) shift = 1;
      other.style.transition = 'transform .2s ease';
      other.style.transform   = `translateY(${shift * (card.offsetHeight + 10)}px)`;
    });
  });

  card.addEventListener('pointerup', () => {
    if (!drag.on || drag.el !== card) return;

    if (drag.moved) {
      const slot    = Math.round(drag.dy / (card.offsetHeight + 10));
      const newIdx  = Math.max(0, Math.min(tasks.length - 1, index + slot));
      if (newIdx !== index) {
        const [t] = tasks.splice(index, 1);
        tasks.splice(newIdx, 0, t);
      }
      card.classList.remove('lifting');
      card.style.cssText = '';
      document.querySelectorAll('.task-card').forEach(c => { c.style.cssText = ''; });
      renderTasks(false);
    } else {
      // Tap → toggle adjuster
      card.classList.remove('lifting');
      const id   = parseInt(card.dataset.id);
      openAdj    = openAdj === id ? null : id;
      const adj  = card.querySelector('.time-adj');
      adj.classList.toggle('open', openAdj === id);
    }

    drag = { on: false, idx: -1, el: null, startY: 0, dy: 0, moved: false };
  });
}

// ─── Time adjust ─────────────────────────────────────────────────────────────
document.getElementById('taskList').addEventListener('click', e => {
  const btn = e.target.closest('.adj-btn');
  if (!btn) return;
  const id     = parseInt(btn.dataset.id);
  const task   = tasks.find(t => t.id === id);
  if (!task) return;
  task.mins   += btn.dataset.action === 'plus' ? 15 : -15;
  task.mins    = Math.max(0, Math.min(23*60+45, task.mins));
  const card   = document.querySelector(`.task-card[data-id="${id}"]`);
  card.querySelector('.card-time').textContent     = minsToTime(task.mins);
  card.querySelector('.card-ampm').textContent     = ampm(task.mins);
  card.querySelector('.adj-time-disp').textContent = minsToTime(task.mins);
});

// ─── Bottom buttons ───────────────────────────────────────────────────────────
document.getElementById('btnOk').addEventListener('click', function () {
  this.textContent = '✓ Your day is set!';
  this.classList.add('success');
  document.querySelectorAll('.task-card').forEach((c, i) => {
    setTimeout(() => {
      c.classList.remove('success-anim');
      // force reflow so animation restarts if tapped twice
      void c.offsetWidth;
      c.classList.add('success-anim');
    }, i * 72);
  });
  setTimeout(() => {
    this.textContent = 'Looks good';
    this.classList.remove('success');
  }, 2500);
});

document.getElementById('btnAdjust').addEventListener('click', () => {
  const sub = document.getElementById('heroSub');
  sub.style.color   = '#e07c3a';
  sub.textContent   = 'Tap any task to adjust the time ↑';
  setTimeout(() => {
    sub.style.color = '';
    sub.textContent = 'Feel free to tweak anything';
  }, 2800);
});

// ─── Init ─────────────────────────────────────────────────────────────────────
renderTasks(true);
</script>

</body>
</html>
