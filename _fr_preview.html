<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<title>First-run preview</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Rubik:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;height:100%;}
  #firstRunScreen{ --fr-orange:#FF7A3D; --fr-orange-deep:#E5621A; --fr-orange-soft:#FFE9D2;
    --fr-purple:#7C3AED; --fr-purple-soft:#EFE7FE; --fr-mint:#2F9E7E; --fr-mint-soft:#DFF3EA;
    --fr-ink:#1A0F08; --fr-muted:#9E8878;
    position:fixed;inset:0;z-index:9999;display:flex;align-items:flex-start;justify-content:center;direction:rtl;
    overflow-y:auto;background:#FAF3E9;padding:0;}
  #firstRunScreen .fr-shell{width:min(100vw, 480px);margin:auto 0;flex:0 0 auto;display:block;}
  #firstRunScreen .fr-state{display:flex;flex-direction:column;}
  #firstRunScreen .fr-state.hidden{display:none;}
  #firstRunScreen .fr-hero{width:100%;flex:0 0 auto;background-color:#FAF3E9;background-repeat:no-repeat;background-position:top center;background-size:100% auto;}
  #firstRunScreen .fr-hero-welcome{aspect-ratio:953 / 1170;background-image:url("assets/welcome-hero.png");}
  #firstRunScreen .fr-hero-create{aspect-ratio:446 / 419;background-image:url("assets/create-family-hero.png");}
  #firstRunScreen .fr-hero-join{aspect-ratio:442 / 414;background-image:url("assets/join-family-hero.png");}
  #firstRunScreen .fr-card{position:relative;z-index:1;margin-top:-30px;flex:0 0 auto;background:#FFFDFA;border-radius:30px 30px 0 0;box-shadow:0 -12px 34px rgba(120,70,25,.12);padding:24px 22px 26px;display:flex;flex-direction:column;gap:13px;}
  #firstRunScreen .fr-choice{display:flex;align-items:center;gap:13px;width:100%;border:1.5px solid rgba(224,180,140,.34);border-radius:18px;padding:15px 16px;cursor:pointer;background:#fff;font-family:'Rubik',sans-serif;font-size:16px;font-weight:700;color:var(--fr-ink);box-shadow:0 4px 14px rgba(160,90,30,.07);}
  #firstRunScreen .fr-choice-ic{flex:0 0 auto;width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;}
  #firstRunScreen .fr-choice-ic svg{width:21px;height:21px;}
  #firstRunScreen .fr-choice-tx{flex:1 1 auto;text-align:right;line-height:1.25;}
  #firstRunScreen .fr-choice-go{flex:0 0 auto;color:var(--fr-muted);opacity:.7;}
  #firstRunScreen .fr-choice-go svg{width:18px;height:18px;display:block;}
  #firstRunScreen .fr-choice-join .fr-choice-ic{background:var(--fr-purple-soft);color:var(--fr-purple);}
  #firstRunScreen .fr-choice-create .fr-choice-ic{background:var(--fr-mint-soft);color:var(--fr-mint);}
  #firstRunScreen .fr-h1{font-family:'Nunito','Rubik',sans-serif;font-size:22px;font-weight:900;color:#2D2438;text-align:center;line-height:1.15;}
  #firstRunScreen .fr-sub{font-size:13.5px;font-weight:500;color:var(--fr-muted);text-align:center;line-height:1.45;margin-top:-6px;}
  #firstRunScreen .fr-field-lbl{font-size:12px;font-weight:700;color:#8A6F5C;text-align:right;margin-bottom:-6px;}
  #firstRunScreen .fr-input{width:100%;box-sizing:border-box;font-family:'Rubik',sans-serif;font-size:17px;font-weight:600;color:var(--fr-ink);background:#FFF8F2;border:2px solid rgba(224,180,140,.4);border-radius:14px;padding:13px 15px;outline:none;}
  #firstRunScreen .fr-input:focus{border-color:var(--fr-orange);box-shadow:0 0 0 3px rgba(255,122,61,.16);}
  #firstRunScreen .fr-err{color:#C03020;font-size:13px;font-weight:700;min-height:16px;text-align:right;}
  #firstRunScreen .fr-cta{width:100%;border:0;border-radius:16px;padding:15px;margin-top:4px;cursor:pointer;font-family:'Rubik',sans-serif;font-size:17px;font-weight:800;color:#fff;box-shadow:0 8px 20px rgba(160,90,30,.18);}
  #firstRunScreen .fr-cta-create,#firstRunScreen .fr-cta-join{background:linear-gradient(135deg,#8B5CD6 0%,#7C3AED 55%,#6D28D9 100%);}
  #firstRunScreen .fr-role-q{font-size:13px;font-weight:700;color:#8A6F5C;text-align:center;margin-top:2px;}
  #firstRunScreen .fr-roles{display:flex;gap:10px;}
  #firstRunScreen .fr-role{flex:1 1 0;min-width:0;display:flex;align-items:center;justify-content:center;gap:7px;padding:12px;border-radius:14px;cursor:pointer;background:#fff;border:2px solid rgba(224,180,140,.4);font-family:'Rubik',sans-serif;font-size:15px;font-weight:700;color:var(--fr-muted);}
  #firstRunScreen .fr-role svg{width:18px;height:18px;}
  #firstRunScreen .fr-role.is-active{border-color:var(--fr-purple);color:var(--fr-purple);background:var(--fr-purple-soft);}
  #firstRunScreen .fr-code{display:flex;gap:8px;justify-content:center;direction:ltr;}
  #firstRunScreen .fr-code-box{flex:1 1 0;min-width:0;aspect-ratio:1 / 1;max-width:50px;box-sizing:border-box;text-align:center;text-transform:uppercase;font-family:'Rubik',sans-serif;font-size:24px;font-weight:800;color:var(--fr-ink);background:#FFF8F2;border:2px solid rgba(224,180,140,.4);border-radius:13px;padding:0;outline:none;}
  #firstRunScreen .fr-code-box:focus{border-color:var(--fr-purple);box-shadow:0 0 0 3px rgba(124,58,237,.16);}
  #firstRunScreen .fr-code-box::placeholder{color:#C9BCD6;font-weight:600;}
  #firstRunScreen .fr-link{background:none;border:0;cursor:pointer;align-self:center;font-family:'Rubik',sans-serif;font-size:14px;font-weight:700;color:var(--fr-purple);padding:4px;}
  #firstRunScreen .fr-hint{font-size:12px;font-weight:500;color:var(--fr-muted);text-align:center;line-height:1.4;}
</style>
</head>
<body>
  <div id="firstRunScreen">
    <div class="fr-shell">

      <div class="fr-state" data-fr-state="welcome">
        <div class="fr-hero fr-hero-welcome" role="img" aria-label="Family"></div>
        <div class="fr-card">
          <button type="button" class="fr-choice fr-choice-join" onclick="_frGoto('join')">
            <span class="fr-choice-ic" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="15" r="4"/><path d="m10.8 12.2 6.2-6.2"/><path d="m16 6 2 2"/><path d="m19 3 2 2"/></svg></span>
            <span class="fr-choice-tx">יש לי קוד משפחה</span>
            <span class="fr-choice-go" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></span>
          </button>
          <button type="button" class="fr-choice fr-choice-create" onclick="_frGoto('create')">
            <span class="fr-choice-ic" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></span>
            <span class="fr-choice-tx">אני רוצה ליצור משפחה חדשה</span>
            <span class="fr-choice-go" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></span>
          </button>
        </div>
      </div>

      <div class="fr-state hidden" data-fr-state="create">
        <div class="fr-hero fr-hero-create" role="img" aria-label="בואו נקים את המשפחה שלכם"></div>
        <div class="fr-card">
          <div class="fr-h1">✨ בואו נקים את המשפחה שלכם</div>
          <label class="fr-field-lbl" for="frCreateName">שם המשפחה</label>
          <input class="fr-input" id="frCreateName" type="text" placeholder="למשל: משפחת כהן" dir="rtl" maxlength="24" />
          <div class="fr-role-q">מי משתמש במכשיר הזה?</div>
          <div class="fr-roles">
            <button type="button" class="fr-role" data-role="mom" onclick="_frPickRole(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M5 21c0-4 3-7 7-7s7 3 7 7"/></svg><span>אמא</span></button>
            <button type="button" class="fr-role" data-role="dad" onclick="_frPickRole(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M5 21c0-4 3-7 7-7s7 3 7 7"/></svg><span>אבא</span></button>
          </div>
          <button type="button" class="fr-cta fr-cta-create" onclick="_firstRunCreate()">צור משפחה</button>
          <div class="fr-hint">אפשר לחבר ילדים נוספים אחר כך בהגדרות בני המשפחה.</div>
        </div>
      </div>

      <div class="fr-state hidden" data-fr-state="join">
        <div class="fr-hero fr-hero-join" role="img" aria-label="הצטרפות למשפחה שלכם"></div>
        <div class="fr-card">
          <div class="fr-h1">הצטרפו למשפחה שלכם 🏡</div>
          <div class="fr-sub">קיבלתם קוד משפחה? הכניסו אותו כאן.</div>
          <div class="fr-code" id="frCodeBoxes" dir="ltr">
            <input class="fr-code-box" type="text" maxlength="1" placeholder="–" aria-label="תו 1" oninput="_frCodeInput(this,0)" onkeydown="_frCodeKey(event,this,0)" onpaste="_frCodePaste(event)" />
            <input class="fr-code-box" type="text" maxlength="1" placeholder="–" aria-label="תו 2" oninput="_frCodeInput(this,1)" onkeydown="_frCodeKey(event,this,1)" onpaste="_frCodePaste(event)" />
            <input class="fr-code-box" type="text" maxlength="1" placeholder="–" aria-label="תו 3" oninput="_frCodeInput(this,2)" onkeydown="_frCodeKey(event,this,2)" onpaste="_frCodePaste(event)" />
            <input class="fr-code-box" type="text" maxlength="1" placeholder="–" aria-label="תו 4" oninput="_frCodeInput(this,3)" onkeydown="_frCodeKey(event,this,3)" onpaste="_frCodePaste(event)" />
            <input class="fr-code-box" type="text" maxlength="1" placeholder="–" aria-label="תו 5" oninput="_frCodeInput(this,4)" onkeydown="_frCodeKey(event,this,4)" onpaste="_frCodePaste(event)" />
            <input class="fr-code-box" type="text" maxlength="1" placeholder="–" aria-label="תו 6" oninput="_frCodeInput(this,5)" onkeydown="_frCodeKey(event,this,5)" onpaste="_frCodePaste(event)" />
          </div>
          <input type="hidden" id="firstRunJoinInp" />
          <div class="fr-err" id="firstRunErr"></div>
          <button type="button" class="fr-cta fr-cta-join" onclick="_firstRunJoin()">הצטרף למשפחה</button>
          <button type="button" class="fr-link" onclick="_frGoto('welcome')">אין לי קוד משפחה</button>
        </div>
      </div>

    </div>
  </div>
<script>
  function _frGoto(state){ document.querySelectorAll('.fr-state').forEach(el=>el.classList.toggle('hidden', el.getAttribute('data-fr-state')!==state)); var f=state==='create'?document.getElementById('frCreateName'):(state==='join'?_frCodeBoxes()[0]:null); if(f){try{f.focus();}catch(e){}} }
  function _frPickRole(el){ document.querySelectorAll('#firstRunScreen .fr-role').forEach(r=>r.classList.remove('is-active')); el.classList.add('is-active'); }
  function _frCodeBoxes(){ return Array.from(document.querySelectorAll('#frCodeBoxes .fr-code-box')); }
  function _frCodeSync(){ var v=_frCodeBoxes().map(b=>b.value).join(''); var h=document.getElementById('firstRunJoinInp'); if(h) h.value=v; }
  function _frCodeInput(box,idx){ box.value=box.value.toUpperCase().replace(/[^A-Z2-9]/g,'').slice(0,1); _frCodeSync(); if(box.value){var bs=_frCodeBoxes(); if(idx<bs.length-1) bs[idx+1].focus();} }
  function _frCodeKey(e,box,idx){ if(e.key==='Backspace'&&!box.value&&idx>0){var bs=_frCodeBoxes(); bs[idx-1].focus(); bs[idx-1].value=''; _frCodeSync(); e.preventDefault();} }
  function _frCodePaste(e){ e.preventDefault(); var src=(e.clipboardData||window.clipboardData); var txt=(src?src.getData('text'):'').toUpperCase().replace(/[^A-Z2-9]/g,'').slice(0,6); var bs=_frCodeBoxes(); bs.forEach((b,i)=>{b.value=txt[i]||'';}); _frCodeSync(); var n=Math.min(txt.length,bs.length-1); if(bs[n]) bs[n].focus(); }
  function _firstRunCreate(){ alert('[preview] create — שם: '+(document.getElementById('frCreateName').value||'(ריק)')); }
  function _firstRunJoin(){ alert('[preview] join — קוד: '+(document.getElementById('firstRunJoinInp').value||'(ריק)')); }
</script>
</body>
</html>
