<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <title>Family — Add Task</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{
      background:radial-gradient(ellipse at 40% 30%,#e8ddd4,#d4c8bd);
      min-height:100vh;min-height:100dvh;display:flex;justify-content:center;align-items:center;
      font-family:'Nunito',sans-serif;padding:32px 16px;
    }

    /* ── Phone ── */
    .phone{
      width:375px;height:812px;
      background:linear-gradient(175deg,#fffaf5 0%,#fff4e8 55%,#fdebd8 100%);
      border-radius:48px;
      box-shadow:0 40px 100px rgba(0,0,0,.18),0 12px 36px rgba(0,0,0,.09),inset 0 1px 0 rgba(255,255,255,.9);
      overflow:hidden;position:relative;display:flex;flex-direction:column;
      border:1px solid rgba(255,255,255,.6);
    }
    @media(max-width:500px){
      body{padding:0;align-items:stretch;min-height:100vh;min-height:100dvh;}
      .phone{width:100%;height:100vh;height:100dvh;border-radius:0;box-shadow:none;border:none;}
    }

    /* ── Status bar ── */
    .sbar{display:flex;justify-content:space-between;align-items:center;padding:16px 28px 0;font-size:13px;font-weight:800;color:#2d2018;flex-shrink:0;}
    .sbar-r{display:flex;align-items:center;gap:5px;}

    /* ── Screen ── */
    .screen{flex:1;display:flex;flex-direction:column;overflow:hidden;padding-bottom:32px;}
    .sp   {flex:1;}
    .sp-lg{flex:1.6;}
    .sp-sm{flex:.5;}

    /* ── Top bar ── */
    .topbar{padding:12px 20px;flex-shrink:0;animation:fadeUp .35s ease both;}
    .back{
      display:inline-flex;align-items:center;gap:7px;background:none;border:none;cursor:pointer;
      font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:#9e8878;
      padding:8px 14px;border-radius:14px;transition:background .15s,color .15s;
    }
    .back:active{background:rgba(0,0,0,.06);color:#5a4030;}

    /* ── Prompt ── */
    .prompt{text-align:center;padding:0 28px;flex-shrink:0;animation:fadeUp .38s ease .05s both;}
    .eyebrow{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:1.2px;color:#e07c3a;margin-bottom:10px;}
    .ptxt{font-size:23px;font-weight:800;color:#1c110a;line-height:1.4;}

    /* ── Mic zone ── */
    .mic-zone{
      width:220px;height:220px;margin:0 auto;position:relative;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
      animation:fadeUp .42s ease .1s both;
    }
    .mwrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
    .mwrap.off{display:none;}

    /* shared mic icon overlay */
    .mic-ov{
      position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      width:34px;height:34px;pointer-events:none;z-index:6;
    }
    .mic-ov svg{width:100%;height:100%;}

    /* ── HEART ── */
    .zone-heart{position:relative;width:150px;height:140px;}
    .btn-heart{
      width:150px;height:140px;cursor:pointer;position:relative;
      animation:heartIdle 2.2s ease-in-out infinite;
      filter:drop-shadow(0 10px 30px rgba(255,92,138,.42));
    }
    .heart-svg{position:absolute;inset:0;width:100%;height:100%;}
    .mic-ov.heart-pos{top:44%;} /* visual center of heart lobes */

    @keyframes heartIdle{
      0%,100%{transform:scale(1);}
      14%    {transform:scale(1.08);}
      28%    {transform:scale(1);}
      42%    {transform:scale(1.05);}
    }
    @keyframes heartRec{
      0%,100%{transform:scale(1.03);filter:drop-shadow(0 0 34px rgba(255,92,138,.9));}
      50%    {transform:scale(1.15);filter:drop-shadow(0 0 54px rgba(255,92,138,1));}
    }
    .rec .btn-heart{animation:heartRec .85s ease-in-out infinite;}

    /* ── STAR ── */
    .zone-star{position:relative;width:200px;height:200px;display:flex;align-items:center;justify-content:center;}
    .sparkle-c{position:absolute;inset:0;pointer-events:none;z-index:4;}
    .btn-star{
      width:155px;height:155px;
      background:linear-gradient(135deg,#ffe566,#ffaa00);
      clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
      cursor:pointer;
      animation:starIdle 2.6s ease-in-out infinite;
      filter:drop-shadow(0 8px 22px rgba(255,170,0,.45));
    }

    @keyframes starIdle{
      0%,100%{transform:scale(1) rotate(0deg);    filter:drop-shadow(0 8px 22px rgba(255,170,0,.45)) brightness(1);}
      50%    {transform:scale(1.05) rotate(4deg); filter:drop-shadow(0 12px 32px rgba(255,170,0,.7)) brightness(1.12);}
    }
    @keyframes starRec{
      0%,100%{transform:scale(1.06) rotate(-4deg);filter:drop-shadow(0 10px 32px rgba(255,170,0,.88)) brightness(1.18);}
      50%    {transform:scale(1.16) rotate(4deg); filter:drop-shadow(0 14px 44px rgba(255,170,0,1)) brightness(1.28);}
    }
    .rec .btn-star{animation:starRec .75s ease-in-out infinite;}

    /* ── CLASSIC ── */
    .ring{
      position:absolute;width:140px;height:140px;border-radius:50%;
      border:2.5px solid rgba(255,94,20,.45);pointer-events:none;opacity:0;
    }
    @keyframes rippleOut{0%{transform:scale(1);opacity:.55;}100%{transform:scale(2.6);opacity:0;}}
    .rec .ring.r1{animation:rippleOut 1.5s ease-out 0s   infinite;}
    .rec .ring.r2{animation:rippleOut 1.5s ease-out .38s infinite;}
    .rec .ring.r3{animation:rippleOut 1.5s ease-out .76s infinite;}
    .btn-classic{
      width:140px;height:140px;border-radius:50%;
      background:linear-gradient(135deg,#ff9a4e,#ff5e14);
      cursor:pointer;position:relative;z-index:2;
      box-shadow:0 12px 36px rgba(255,94,20,.38);
      transition:transform .18s,box-shadow .18s;
    }
    .btn-classic:active{transform:scale(.95);box-shadow:0 6px 20px rgba(255,94,20,.28);}

    /* ── BLOB ── */
    .btn-blob{
      width:150px;height:150px;
      background:linear-gradient(135deg,#d8b4fe,#9333ea);
      border-radius:60% 40% 70% 30%/60% 30% 70% 40%;
      cursor:pointer;
      animation:blobIdle 3.8s ease-in-out infinite;
      filter:drop-shadow(0 10px 28px rgba(147,51,234,.4));
    }
    @keyframes blobIdle{
      0%  {border-radius:60% 40% 70% 30%/60% 30% 70% 40%;transform:scale(1);}
      25% {border-radius:40% 60% 30% 70%/30% 60% 40% 70%;transform:scale(1.03);}
      50% {border-radius:70% 30% 60% 40%/50% 70% 30% 50%;transform:scale(1);}
      75% {border-radius:30% 70% 40% 60%/70% 40% 60% 30%;transform:scale(1.02);}
      100%{border-radius:60% 40% 70% 30%/60% 30% 70% 40%;transform:scale(1);}
    }
    @keyframes blobRec{
      0%  {border-radius:60% 40% 70% 30%/60% 30% 70% 40%;transform:scale(1.12);}
      33% {border-radius:40% 60% 30% 70%/30% 60% 40% 70%;transform:scale(1.18);}
      66% {border-radius:70% 30% 60% 40%/50% 70% 30% 50%;transform:scale(1.1);}
      100%{border-radius:60% 40% 70% 30%/60% 30% 70% 40%;transform:scale(1.12);}
    }
    .rec .btn-blob{animation:blobRec 1.1s ease-in-out infinite;filter:drop-shadow(0 14px 42px rgba(147,51,234,.72));}

    /* ── Listening section ── */
    .listen-sec{text-align:center;flex-shrink:0;min-height:50px;display:flex;flex-direction:column;align-items:center;gap:10px;animation:fadeUp .4s ease .18s both;}
    .ltxt{font-size:15px;font-weight:700;color:#9e8878;transition:color .3s,opacity .3s;}
    .ltxt.active{color:#e07c3a;}
    .ltxt.done  {color:#34c759;}
    .wdots{display:flex;gap:5px;align-items:center;height:22px;opacity:0;transition:opacity .3s ease;}
    .wdots.on{opacity:1;}
    .wd{width:4px;border-radius:4px;background:#e07c3a;}
    .wd1{height:8px;} .wd2{height:14px;} .wd3{height:20px;} .wd4{height:14px;} .wd5{height:8px;}
    @keyframes wdPulse{0%,100%{transform:scaleY(1);}50%{transform:scaleY(.22);}}
    .wdots.on .wd1{animation:wdPulse .9s ease-in-out 0s    infinite;}
    .wdots.on .wd2{animation:wdPulse .9s ease-in-out .12s  infinite;}
    .wdots.on .wd3{animation:wdPulse .9s ease-in-out .24s  infinite;}
    .wdots.on .wd4{animation:wdPulse .9s ease-in-out .36s  infinite;}
    .wdots.on .wd5{animation:wdPulse .9s ease-in-out .48s  infinite;}

    /* ── Mode switcher ── */
    .mswitcher{display:flex;justify-content:center;gap:12px;padding:0 24px;flex-shrink:0;animation:fadeUp .4s ease .22s both;}
    .mchip{
      width:58px;height:54px;border-radius:16px;
      background:rgba(255,255,255,.6);backdrop-filter:blur(8px);
      border:1.5px solid rgba(255,255,255,.8);
      box-shadow:0 2px 8px rgba(0,0,0,.06);
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
      cursor:pointer;transition:background .2s,border-color .2s,transform .18s,box-shadow .18s;
    }
    .mchip:active{transform:scale(.88);}
    .mchip.on{background:rgba(255,112,51,.12);border-color:rgba(255,112,51,.38);box-shadow:0 4px 14px rgba(255,112,51,.15);}
    .cshape{font-size:19px;line-height:1;}
    .clbl{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;color:#c4ae9f;}
    .mchip.on .clbl{color:#e07c3a;}

    @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
  </style>
</head>
<body>

<div class="phone">

  <!-- Status bar -->
  <div class="sbar">
    <span>9:41</span>
    <div class="sbar-r">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <rect x="0"  y="4"   width="3" height="8"    rx="1" fill="#2d2018"/>
        <rect x="4"  y="2.5" width="3" height="9.5"  rx="1" fill="#2d2018"/>
        <rect x="8"  y="1"   width="3" height="11"   rx="1" fill="#2d2018"/>
        <rect x="12" y="0"   width="3" height="12"   rx="1" fill="#2d2018"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 20 14" fill="none">
        <path d="M10 2.5C13.5 2.5 16.6 4 18.8 6.4L20 5.2C17.5 2.4 13.9.5 10 .5 6.1.5 2.5 2.4 0 5.2L1.2 6.4C3.4 4 6.5 2.5 10 2.5Z" fill="#2d2018"/>
        <path d="M10 6C12.4 6 14.5 7 16 8.7L17.2 7.5C15.4 5.5 12.8 4 10 4 7.2 4 4.6 5.5 2.8 7.5L4 8.7C5.5 7 7.6 6 10 6Z" fill="#2d2018"/>
        <path d="M10 9.5C11.4 9.5 12.6 10.1 13.5 11L10 14.5 6.5 11C7.4 10.1 8.6 9.5 10 9.5Z" fill="#2d2018"/>
      </svg>
      <svg width="26" height="12" viewBox="0 0 26 12" fill="none">
        <rect x=".5" y=".5" width="22" height="11" rx="3.5" stroke="#2d2018" stroke-opacity=".35"/>
        <rect x="1.5" y="1.5" width="18" height="9" rx="2.5" fill="#2d2018"/>
        <path d="M24 4.5v3a2 2 0 0 1 0-3Z" fill="#2d2018" fill-opacity=".4"/>
      </svg>
    </div>
  </div>

  <div class="screen">

    <!-- Back -->
    <div class="topbar">
      <button class="back">
        <svg width="8" height="14" viewBox="0 0 8 14" fill="none">
          <path d="M7 1L1 7l6 6" stroke="#9e8878" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Today
      </button>
    </div>

    <div class="sp"></div>

    <!-- Prompt -->
    <div class="prompt">
      <div class="eyebrow">✨ Voice Input</div>
      <div class="ptxt">Tell me what needs<br>to happen today</div>
    </div>

    <div class="sp-lg"></div>

    <!-- Mic zone -->
    <div class="mic-zone" id="micZone">

      <!-- HEART -->
      <div class="mwrap" id="wrap-heart">
        <div class="zone-heart">
          <div class="btn-heart" id="btn-heart">
            <svg class="heart-svg" viewBox="0 0 100 82" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#ffb3c8"/>
                  <stop offset="100%" stop-color="#ff5c8a"/>
                </linearGradient>
              </defs>
              <path d="M50 80 C50 80 8 52 8 26 C8 10 22 2 34 2 C42 2 48 8 50 15 C52 8 58 2 66 2 C78 2 92 10 92 26 C92 52 50 80 50 80Z" fill="url(#hg)"/>
            </svg>
          </div>
          <div class="mic-ov heart-pos">
            <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.92)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="2" width="6" height="11" rx="3"/>
              <path d="M5 10c0 3.866 3.134 7 7 7s7-3.134 7-7"/>
              <line x1="12" y1="17" x2="12" y2="22"/>
              <line x1="8"  y1="22" x2="16" y2="22"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- STAR -->
      <div class="mwrap off" id="wrap-star">
        <div class="zone-star">
          <div class="sparkle-c" id="sparkleCont"></div>
          <div class="btn-star"  id="btn-star"></div>
          <div class="mic-ov">
            <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.92)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="2" width="6" height="11" rx="3"/>
              <path d="M5 10c0 3.866 3.134 7 7 7s7-3.134 7-7"/>
              <line x1="12" y1="17" x2="12" y2="22"/>
              <line x1="8"  y1="22" x2="16" y2="22"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- CLASSIC -->
      <div class="mwrap off" id="wrap-classic">
        <div class="ring r1"></div>
        <div class="ring r2"></div>
        <div class="ring r3"></div>
        <div class="btn-classic" id="btn-classic">
          <div class="mic-ov" style="position:static;transform:none;width:36px;height:36px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.92)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="2" width="6" height="11" rx="3"/>
              <path d="M5 10c0 3.866 3.134 7 7 7s7-3.134 7-7"/>
              <line x1="12" y1="17" x2="12" y2="22"/>
              <line x1="8"  y1="22" x2="16" y2="22"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- BLOB -->
      <div class="mwrap off" id="wrap-blob">
        <div class="btn-blob" id="btn-blob">
          <div class="mic-ov" style="position:static;transform:none;width:36px;height:36px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.92)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="2" width="6" height="11" rx="3"/>
              <path d="M5 10c0 3.866 3.134 7 7 7s7-3.134 7-7"/>
              <line x1="12" y1="17" x2="12" y2="22"/>
              <line x1="8"  y1="22" x2="16" y2="22"/>
            </svg>
          </div>
        </div>
      </div>

    </div><!-- /mic-zone -->

    <div class="sp"></div>

    <!-- Listening state -->
    <div class="listen-sec">
      <div class="ltxt" id="ltxt">Tap to speak</div>
      <div class="wdots" id="wdots">
        <div class="wd wd1"></div>
        <div class="wd wd2"></div>
        <div class="wd wd3"></div>
        <div class="wd wd4"></div>
        <div class="wd wd5"></div>
      </div>
    </div>

    <div class="sp"></div>

    <!-- Mode switcher -->
    <div class="mswitcher">
      <div class="mchip on" data-mode="heart">  <span class="cshape">❤️</span><span class="clbl">Heart</span></div>
      <div class="mchip"    data-mode="star">   <span class="cshape">⭐</span><span class="clbl">Star</span></div>
      <div class="mchip"    data-mode="classic"><span class="cshape">🎙️</span><span class="clbl">Mic</span></div>
      <div class="mchip"    data-mode="blob">   <span class="cshape">🫧</span><span class="clbl">Blob</span></div>
    </div>

  </div><!-- /screen -->
</div><!-- /phone -->

<script>
  let mode = 'heart', listening = false, timer = null;

  const zone  = document.getElementById('micZone');
  const ltxt  = document.getElementById('ltxt');
  const wdots = document.getElementById('wdots');
  const sc    = document.getElementById('sparkleCont');

  const wrapIds = { heart:'wrap-heart', star:'wrap-star', classic:'wrap-classic', blob:'wrap-blob' };

  // ── Mode switching ──
  document.querySelectorAll('.mchip').forEach(chip => {
    chip.addEventListener('click', () => {
      const m = chip.dataset.mode;
      if (m === mode) return;
      if (listening) stop();
      document.getElementById(wrapIds[mode]).classList.add('off');
      document.querySelector(`.mchip[data-mode="${mode}"]`).classList.remove('on');
      mode = m;
      document.getElementById(wrapIds[mode]).classList.remove('off');
      chip.classList.add('on');
    });
  });

  // ── Mic zone click ──
  zone.addEventListener('click', () => { listening ? stop() : start(); });

  // ── Start / stop ──
  function start() {
    listening = true;
    zone.classList.add('rec');
    ltxt.textContent = 'Listening...';
    ltxt.classList.add('active');
    ltxt.classList.remove('done');
    wdots.classList.add('on');
    if (mode === 'star') burst();
    timer = setTimeout(stop, 3200);
  }

  function stop() {
    clearTimeout(timer);
    listening = false;
    zone.classList.remove('rec');
    wdots.classList.remove('on');
    ltxt.textContent = 'Got it ✓';
    ltxt.classList.remove('active');
    ltxt.classList.add('done');
    setTimeout(() => { ltxt.textContent = 'Tap to speak'; ltxt.classList.remove('done'); }, 1800);
  }

  // ── Star sparkle burst ──
  function burst() {
    const colors = ['#ffe566','#ffcc00','#ffaa00','#fff3a0','#ff9500','#ffffff'];
    for (let i = 0; i < 14; i++) {
      const s     = document.createElement('div');
      const angle = (i / 14) * Math.PI * 2;
      const dist  = 68 + Math.random() * 44;
      const sz    = 3 + Math.random() * 5;
      const col   = colors[i % colors.length];
      s.style.cssText = `position:absolute;width:${sz}px;height:${sz}px;background:${col};border-radius:50%;left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none;`;
      sc.appendChild(s);
      s.animate(
        [{ transform:'translate(-50%,-50%) scale(1)', opacity:1 },
         { transform:`translate(calc(-50% + ${Math.cos(angle)*dist}px),calc(-50% + ${Math.sin(angle)*dist}px)) scale(0)`, opacity:0 }],
        { duration: 560 + Math.random()*120, easing:'ease-out', fill:'forwards' }
      ).onfinish = () => s.remove();
    }
  }

/* Mobile keyboard handling: on phones, shrink .phone to window.visualViewport.height
   so that when the keyboard opens, inputs/submit buttons stay visible above it.
   Desktop (>500px) is untouched. Easy to revert: remove this IIFE. */
(function () {
  if (!window.visualViewport) return;
  var vv = window.visualViewport;
  var mq = window.matchMedia('(max-width:500px)');
  function apply() {
    if (!mq.matches) return;
    var ph = document.querySelectorAll('.phone');
    for (var i = 0; i < ph.length; i++) ph[i].style.height = vv.height + 'px';
  }
  function clear() {
    var ph = document.querySelectorAll('.phone');
    for (var i = 0; i < ph.length; i++) ph[i].style.height = '';
  }
  vv.addEventListener('resize', apply);
  window.addEventListener('orientationchange', function () { setTimeout(function(){ clear(); apply(); }, 400); });
  if (mq.addEventListener) mq.addEventListener('change', function(){ if (!mq.matches) clear(); else apply(); });
  apply();
})();
</script>

</body>
</html>
